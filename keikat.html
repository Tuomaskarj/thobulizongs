<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keikat – Thö Bulizongs</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <script src="nav.js"></script>


  <div class="page-header">
    <p>Missä soitamme</p>
    <h1>Keikkakalenteri</h1>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="vaihtoTab('tulevat', this)">Tulevat keikat</button>
    <button class="tab-btn" onclick="vaihtoTab('menneet', this)">Menneet keikat</button>
  </div>

  <!-- TULEVAT -->
  <div class="tab-content active" id="tab-tulevat">
    <section>
      <div class="container">
        <div class="events-list" id="list-tulevat">
          <div class="loading">Ladataan keikkoja...</div>
        </div>
      </div>
    </section>
  </div>

  <!-- MENNEET -->
  <div class="tab-content" id="tab-menneet">
    <section>
      <div class="container">
        <div id="list-menneet">
          <div class="loading">Ladataan keikkoja...</div>
        </div>
      </div>
    </section>
  </div>

  <footer>
    <div class="footer-logo">Thö Bulizongs</div>
    <p class="footer-tagline">Tanssittavaa musiikkia · Seinäjoki</p>
    <div class="footer-links">
      <a href="index.html">Etusivu</a>
      <a href="bandi.html">Bändi</a>
      <a href="setlista.html">Settilista</a>
      <a href="uutiset.html">Uutiset</a>
      <a href="index.html#yhteydenotto">Yhteystiedot</a>
    </div>
    <p class="footer-copy">&copy; 2025 Thö Bulizongs. Kaikki oikeudet pidätetään.</p>
  </footer>

  <script>
    const REPO = 'Tuomaskarj/thobulizongs';
    const API = `https://api.github.com/repos/${REPO}/contents/_keikat`;
    const KUUKAUDET = ['Tammi','Helmi','Maalis','Huhti','Touko','Kesä','Heinä','Elo','Syys','Loka','Marras','Joulu'];

    function parseFrontmatter(text) {
      const match = text.match(/^---\n([\s\S]*?)\n---/);
      if (!match) return {};
      const fm = {};
      match[1].split('\n').forEach(line => {
        const [key, ...val] = line.split(':');
        if (key) fm[key.trim()] = val.join(':').trim().replace(/^"|"$/g, '');
      });
      return fm;
    }

    function eventItemHTML(k, mennyt = false) {
      const d = new Date(k.date);
      const day = String(d.getDate()).padStart(2, '0');
      const month = KUUKAUDET[d.getMonth()];
      const year = d.getFullYear();
      const thisYear = new Date().getFullYear();
      return `
        <div class="event-item${mennyt ? ' mennyt' : ''}">
          <div class="event-date">
            <div class="day">${day}</div>
            <div class="month">${month}</div>
            ${mennyt && year !== thisYear ? `<div class="year">${year}</div>` : ''}
          </div>
          <div class="event-info">
            <h3>${k.title || ''} – ${k.city || ''}</h3>
            <p>${k.venue || ''}${k.time ? ' &nbsp;·&nbsp; klo ' + k.time : ''}${k.info ? ' &nbsp;·&nbsp; ' + k.info : ''}</p>
          </div>
          <div class="event-tag">${k.type || ''}</div>
        </div>`;
    }

    function vaihtoTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }

    async function lataaKeikat() {
      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error();
        const files = await res.json();

        const mdFiles = files.filter(f => f.name.endsWith('.md'));
        const keikat = await Promise.all(mdFiles.map(async f => {
          const r = await fetch(f.download_url);
          const text = await r.text();
          return parseFrontmatter(text);
        }));

        const today = new Date(); today.setHours(0,0,0,0);

        const tulevat = keikat
          .filter(k => k.date && new Date(k.date) >= today)
          .sort((a, b) => new Date(a.date) - new Date(b.date));

        const menneet = keikat
          .filter(k => k.date && new Date(k.date) < today)
          .sort((a, b) => new Date(b.date) - new Date(a.date));

        // Render tulevat
        const listTulevat = document.getElementById('list-tulevat');
        if (tulevat.length === 0) {
          listTulevat.innerHTML = '<div class="empty-state">Ei tulevia keikkoja juuri nyt — seuraa Instagramia!</div>';
        } else {
          listTulevat.innerHTML = '<div class="events-list">' + tulevat.map(k => eventItemHTML(k, false)).join('') + '</div>';
        }

        // Render menneet ryhmiteltynä vuoden mukaan
        const listMenneet = document.getElementById('list-menneet');
        if (menneet.length === 0) {
          listMenneet.innerHTML = '<div class="empty-state">Keikkahistoria kertyy ajan myötä.</div>';
        } else {
          // Ryhmittele vuoden mukaan
          const vuosiRyhmat = {};
          menneet.forEach(k => {
            const vuosi = new Date(k.date).getFullYear();
            if (!vuosiRyhmat[vuosi]) vuosiRyhmat[vuosi] = [];
            vuosiRyhmat[vuosi].push(k);
          });

          listMenneet.innerHTML = Object.keys(vuosiRyhmat)
            .sort((a, b) => b - a)
            .map(vuosi => `
              <h2 class="year-heading">${vuosi}</h2>
              <div class="events-list">
                ${vuosiRyhmat[vuosi].map(k => eventItemHTML(k, true)).join('')}
              </div>`)
            .join('');
        }

        // Päivitä tab-napin laskuri
        document.querySelector('.tab-btn').textContent = `Tulevat keikat (${tulevat.length})`;

      } catch(e) {
        document.getElementById('list-tulevat').innerHTML = '<div class="empty-state">Keikkoja ei juuri nyt löydy.</div>';
        document.getElementById('list-menneet').innerHTML = '<div class="empty-state">Keikkoja ei juuri nyt löydy.</div>';
      }
    }

    lataaKeikat();
  </script>

</body>
</html>
