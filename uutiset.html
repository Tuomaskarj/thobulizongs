<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uutiset – Thö Bulizongs</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #1c1c1c;
      --white: #ffffff;
      --off-white: #f7f5f2;
      --accent: #c0392b;
      --accent-light: #e74c3c;
      --grey-mid: #555;
      --grey-light: #999;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--off-white); color: var(--black); font-family: 'DM Sans', sans-serif; }

    nav {
      position: sticky; top: 0; z-index: 100;
      padding: 1rem 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--black);
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; font-weight: 900; font-style: italic;
      color: var(--white); text-decoration: none;
      text-shadow: 2px 2px 0px #000;
    }

    .nav-links { display: flex; gap: 1.8rem; list-style: none; align-items: center; }
    .nav-links a { color: rgba(255,255,255,0.65); text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
    .nav-links a:hover { color: var(--white); }
    .nav-cta { background: var(--accent) !important; color: var(--white) !important; padding: 0.45rem 1.1rem; border-radius: 4px; }

    .page-header {
      background: var(--black);
      padding: 4rem 2rem 3rem;
      text-align: center;
    }

    .page-header p { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 0.6rem; }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900; font-style: italic;
      color: var(--white);
      text-shadow: 2px 2px 0 #000;
    }

    main { max-width: 900px; margin: 0 auto; padding: 3rem 2rem 5rem; }

    /* LISTA */
    .uutiset-lista { display: flex; flex-direction: column; gap: 2rem; }

    .uutinen-full {
      background: var(--white);
      border: 1px solid #e0ddd8;
      border-radius: 6px;
      overflow: hidden;
    }

    .uutinen-full-kuva {
      aspect-ratio: 16/6;
      background: #e8e5e0;
      overflow: hidden;
    }

    .uutinen-full-kuva img { width: 100%; height: 100%; object-fit: cover; }

    .uutinen-full-body { padding: 2rem; }

    .uutinen-pvm {
      font-size: 0.72rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .uutinen-otsikko {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 900;
      margin-bottom: 1rem; line-height: 1.2;
    }

    .uutinen-teksti {
      color: #444; line-height: 1.8; font-size: 0.97rem;
    }

    .uutinen-teksti p { margin-bottom: 1rem; }
    .uutinen-teksti h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin: 1.5rem 0 0.5rem; }
    .uutinen-teksti strong { font-weight: 500; }

    .loading {
      text-align: center; padding: 4rem;
      color: var(--grey-light); font-size: 0.9rem;
    }

    footer { background: var(--black); padding: 2rem; text-align: center; }
    .footer-logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 900; font-style: italic; color: var(--white); text-shadow: 2px 2px 0 #000; margin-bottom: 0.5rem; }
    .footer-back { color: rgba(255,255,255,0.4); font-size: 0.82rem; text-decoration: none; transition: color 0.2s; }
    .footer-back:hover { color: rgba(255,255,255,0.85); }

    @media (max-width: 600px) {
      nav { padding: 1rem; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Thö Bulizongs</a>
    <ul class="nav-links">
      <li><a href="index.html#about">Bändi</a></li>
      <li><a href="index.html#keikkakalenteri">Keikat</a></li>
      <li><a href="index.html#uutiset">Uutiset</a></li>
      <li><a href="index.html#yhteydenotto" class="nav-cta">Tilaa keikka</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <p>Ajankohtaista</p>
    <h1>Uutiset</h1>
  </div>

  <main>
    <div class="uutiset-lista" id="uutiset-lista">
      <div class="loading">Ladataan uutisia...</div>
    </div>
  </main>

  <footer>
    <div class="footer-logo">Thö Bulizongs</div>
    <br>
    <a href="index.html" class="footer-back">← Takaisin etusivulle</a>
  </footer>

  <script>
    const REPO = 'Tuomaskarj/thobulizongs';
    const API = `https://api.github.com/repos/${REPO}/contents/_uutiset`;

    function parseFrontmatter(text) {
      const match = text.match(/^---\n([\s\S]*?)\n---/);
      if (!match) return { body: text };
      const fm = {};
      match[1].split('\n').forEach(line => {
        const [key, ...val] = line.split(':');
        if (key) fm[key.trim()] = val.join(':').trim().replace(/^"|"$/g, '');
      });
      fm.body = text.replace(/^---\n[\s\S]*?\n---\n/, '').trim();
      return fm;
    }

    function formatDate(str) {
      if (!str) return '';
      return new Date(str).toLocaleDateString('fi-FI', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    // Yksinkertainen markdown → HTML
    function markdownToHtml(md) {
      return md
        .replace(/^## (.*)/gm, '<h2>$1</h2>')
        .replace(/^# (.*)/gm, '<h2>$1</h2>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^/, '<p>')
        .replace(/$/, '</p>');
    }

    async function lataaKaikki() {
      const lista = document.getElementById('uutiset-lista');
      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error();
        const files = await res.json();

        const mdFiles = files
          .filter(f => f.name.endsWith('.md'))
          .sort((a, b) => b.name.localeCompare(a.name));

        if (mdFiles.length === 0) {
          lista.innerHTML = '<div class="loading">Uutisia ei vielä ole.</div>';
          return;
        }

        const uutiset = await Promise.all(mdFiles.map(async f => {
          const r = await fetch(f.download_url);
          const text = await r.text();
          return { ...parseFrontmatter(text), slug: f.name.replace('.md', '') };
        }));

        lista.innerHTML = uutiset.map(u => `
          <article class="uutinen-full" id="${u.slug}">
            ${u.image ? `<div class="uutinen-full-kuva"><img src="${u.image}" alt="${u.title || ''}" /></div>` : ''}
            <div class="uutinen-full-body">
              <div class="uutinen-pvm">${formatDate(u.date)}</div>
              <h2 class="uutinen-otsikko">${u.title || 'Uutinen'}</h2>
              <div class="uutinen-teksti">${markdownToHtml(u.body)}</div>
            </div>
          </article>
        `).join('');

        // Scroll to anchor if present
        if (window.location.hash) {
          setTimeout(() => {
            const el = document.querySelector(window.location.hash);
            if (el) el.scrollIntoView({ behavior: 'smooth' });
          }, 300);
        }

      } catch(e) {
        lista.innerHTML = '<div class="loading">Uutisia ei juuri nyt löydy — palataan pian!</div>';
      }
    }

    lataaKaikki();
  </script>

</body>
</html>
