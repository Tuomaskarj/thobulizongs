[build]
  publish = "."

# Salainen admin-osoite — vaihda /takaovi haluamaksesi
[[redirects]]
  from = "/takaovi"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/takaovi/*"
  to = "/admin/index.html"
  status = 200

# Estä suora /admin-pääsy — ohjaa etusivulle
[[redirects]]
  from = "/admin"
  to = "/"
  status = 302

[[redirects]]
  from = "/admin/*"
  to = "/"
  status = 302
